<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>훈련 기록</title>
</head>
<body>
    <h1>훈련 기록</h1>
    <table border="1">
        <tr>
            <th>반려동물 이름</th>
            <th>훈련 내용</th>
            <th>훈련 날짜</th>
        </tr>
        {% for record in records %}
        <tr>
            <td>{{ record.name }}</td>
            <td>{{ record.description }}</td>
            <td>{{ record.date }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="/">홈으로</a>
</body>
</html>
