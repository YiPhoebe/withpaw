<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>반려동물 정보</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>나의 반려동물 목록</h1>
    <ul>
        {% for pet in pets %}
            <li>이름: {{ pet[1] }}, 종: {{ pet[2] }}, 나이: {{ pet[3] }}</li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('home') }}">홈으로 돌아가기</a>
</body>
</html>
